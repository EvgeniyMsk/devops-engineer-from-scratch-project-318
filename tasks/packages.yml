---
- name: Install unzip for static file extraction
  ansible.builtin.apt:
    name: unzip
    state: present
    update_cache: true
    cache_valid_time: 3600
  when: ansible_os_family == "Debian"
  tags:
    - prepare
    - deploy

- name: Ensure PostgreSQL data directory exists on host
  ansible.builtin.file:
    path: "{{ postgres_data_dir }}"
    state: directory
    owner: "{{ postgres_data_uid }}"
    group: "{{ postgres_data_gid }}"
    mode: "0700"
  tags:
    - prepare
    - deploy
