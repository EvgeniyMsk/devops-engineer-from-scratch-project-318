---
- name: Create nginx_exporter group
  ansible.builtin.group:
    name: nginx_exporter
    system: true
    state: present
  tags:
    - prepare
    - monitoring
    - nginx_exporter

- name: Create nginx_exporter user
  ansible.builtin.user:
    name: nginx_exporter
    group: nginx_exporter
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    state: present
  tags:
    - prepare
    - monitoring
    - nginx_exporter

- name: Download nginx-prometheus-exporter archive
  ansible.builtin.get_url:
    url: "{{ nginx_exporter_download_url }}"
    dest: "/tmp/nginx-prometheus-exporter-{{ nginx_exporter_version }}.linux-{{ nginx_exporter_arch }}.tar.gz"
    mode: "0644"
  tags:
    - prepare
    - monitoring
    - nginx_exporter

- name: Extract nginx-prometheus-exporter archive
  ansible.builtin.unarchive:
    src: "/tmp/nginx-prometheus-exporter-{{ nginx_exporter_version }}.linux-{{ nginx_exporter_arch }}.tar.gz"
    dest: /tmp
    remote_src: true
    creates: "/tmp/nginx-prometheus-exporter"
  tags:
    - prepare
    - monitoring
    - nginx_exporter

- name: Install nginx-prometheus-exporter binary
  ansible.builtin.copy:
    src: /tmp/nginx-prometheus-exporter
    dest: "{{ nginx_exporter_install_dir }}/nginx-prometheus-exporter"
    owner: root
    group: root
    mode: "0755"
    remote_src: true
  notify: Restart nginx_exporter
  tags:
    - prepare
    - monitoring
    - nginx_exporter

- name: Deploy nginx-prometheus-exporter systemd unit
  ansible.builtin.template:
    src: nginx_exporter.service.j2
    dest: /etc/systemd/system/nginx_exporter.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart nginx_exporter
  tags:
    - prepare
    - monitoring
    - nginx_exporter

- name: Enable and start nginx-prometheus-exporter
  ansible.builtin.systemd:
    name: nginx_exporter
    state: started
    enabled: true
    daemon_reload: true
  tags:
    - prepare
    - monitoring
    - nginx_exporter
