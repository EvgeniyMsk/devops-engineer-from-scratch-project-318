nginx_exporter_version: "1.4.2"
nginx_exporter_arch: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}"
nginx_exporter_download_url: >-
  https://github.com/nginx/nginx-prometheus-exporter/releases/download/v{{ nginx_exporter_version }}/nginx-prometheus-exporter_{{ nginx_exporter_version }}_linux_{{ nginx_exporter_arch }}.tar.gz
nginx_exporter_install_dir: /usr/local/bin
nginx_exporter_port: 9113
nginx_exporter_listen_address: "127.0.0.1:{{ nginx_exporter_port }}"
nginx_exporter_scrape_uri: "http://127.0.0.1:{{ nginx_stub_status_port }}{{ nginx_stub_status_path }}"
