---
- name: Ensure prometheus data directory exists
  ansible.builtin.file:
    path: "{{ prometheus_data_dir }}"
    state: directory
    owner: "{{ prometheus_container_uid }}"
    group: "{{ prometheus_container_gid }}"
    mode: "0755"
    recurse: true
  tags:
    - prepare_prometheus

- name: Deploy Prometheus configuration
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ prometheus_config_path }}"
    mode: "0644"
  notify: Restart prometheus
  tags:
    - prepare_prometheus

- name: Start Prometheus container
  community.docker.docker_container:
    name: prometheus
    image: "{{ prometheus_image }}"
    pull: true
    recreate: true
    restart_policy: unless-stopped
    user: "{{ prometheus_container_uid }}:{{ prometheus_container_gid }}"
    volumes:
      - "{{ prometheus_config_path }}:/etc/prometheus/prometheus.yml:ro"
      - "{{ prometheus_data_dir }}:/prometheus"
    ports:
      - "{{ prometheus_listen_address }}:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
  tags:
    - prepare_prometheus
