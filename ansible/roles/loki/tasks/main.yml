---
- ansible.builtin.import_tasks: firewall.yml

- name: Ensure Loki directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ loki_config_dir }}", owner: root, group: root, mode: "0755" }
    - { path: "{{ loki_data_dir }}", owner: "{{ loki_container_uid }}", group: "{{ loki_container_gid }}", mode: "0755" }
    - { path: "{{ loki_data_dir }}/chunks", owner: "{{ loki_container_uid }}", group: "{{ loki_container_gid }}", mode: "0755" }
    - { path: "{{ loki_data_dir }}/rules", owner: "{{ loki_container_uid }}", group: "{{ loki_container_gid }}", mode: "0755" }
    - { path: "{{ loki_data_dir }}/index", owner: "{{ loki_container_uid }}", group: "{{ loki_container_gid }}", mode: "0755" }
    - { path: "{{ loki_data_dir }}/cache", owner: "{{ loki_container_uid }}", group: "{{ loki_container_gid }}", mode: "0755" }
    - { path: "{{ loki_data_dir }}/compactor", owner: "{{ loki_container_uid }}", group: "{{ loki_container_gid }}", mode: "0755" }
  tags:
    - prepare_loki
    - monitoring

- name: Deploy Loki configuration
  ansible.builtin.template:
    src: loki-config.yml.j2
    dest: "{{ loki_config_dir }}/loki-config.yml"
    mode: "0644"
  notify: Restart loki
  tags:
    - prepare_loki
    - monitoring

- name: Start Loki container
  community.docker.docker_container:
    name: loki
    image: "{{ loki_image }}"
    pull: true
    recreate: true
    restart_policy: unless-stopped
    user: "{{ loki_container_uid }}:{{ loki_container_gid }}"
    networks:
      - name: "{{ loki_docker_network }}"
    volumes:
      - "{{ loki_config_dir }}/loki-config.yml:/etc/loki/config.yml:ro"
      - "{{ loki_data_dir }}:/loki"
    ports:
      - "{{ loki_listen_address }}:{{ loki_listen_port }}:3100"
    command:
      - -config.file=/etc/loki/config.yml
  tags:
    - prepare_loki
    - monitoring
