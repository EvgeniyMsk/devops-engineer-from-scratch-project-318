---
- name: Install UFW firewall
  ansible.builtin.apt:
    name: ufw
    state: present
  when: ansible_os_family == "Debian"
  tags: prepare

- name: Configure UFW default policies
  community.general.ufw:
    direction: incoming
    policy: deny
    state: enabled
  register: ufw_default
  tags: prepare

- name: Allow SSH (port 22)
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp
  tags: prepare

- name: Allow HTTP (port 80)
  community.general.ufw:
    rule: allow
    port: "80"
    proto: tcp
  tags: prepare

- name: Allow HTTPS (port 443)
  community.general.ufw:
    rule: allow
    port: "443"
    proto: tcp
  tags: prepare

- name: Enable firewall
  community.general.ufw:
    state: enabled
  when: ansible_os_family == "Debian"
  tags: prepare
