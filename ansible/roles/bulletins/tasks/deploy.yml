---
- name: Ensure deploy directory exists
  ansible.builtin.file:
    path: "{{ app_deploy_dir }}"
    state: directory
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    mode: "0755"
  tags: deploy

- name: Ensure application log directory exists
  ansible.builtin.file:
    path: "{{ app_log_dir }}"
    state: directory
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    mode: "0755"
  tags: deploy

- name: Log in to container registry (Yandex Cloud)
  become_user: "{{ docker_user }}"
  community.docker.docker_login:
    registry_url: "{{ docker_registry_url }}"
    username: "{{ docker_registry_username }}"
    password: "{{ docker_oauth_token }}"
  no_log: true
  tags: deploy

- name: Create application network
  community.docker.docker_network:
    name: "{{ docker_network_name }}"
  tags: deploy

- name: Ensure PostgreSQL data directory is owned by container user
  ansible.builtin.file:
    path: "{{ postgres_data_dir }}"
    state: directory
    owner: "{{ postgres_data_uid }}"
    group: "{{ postgres_data_gid }}"
    mode: "0700"
    recurse: true
  tags: deploy

- name: Start PostgreSQL-14
  become_user: "{{ docker_user }}"
  community.docker.docker_container:
    name: database
    image: "{{ postgres_image }}"
    pull: true
    recreate: true
    restart_policy: unless-stopped
    networks:
      - name: "{{ docker_network_name }}"
    volumes:
      - "{{ postgres_data_dir }}:/var/lib/postgresql/data"
    ports:
      - "127.0.0.1:5432:5432"
    env:
      POSTGRES_DB: bulletins
      POSTGRES_USER: "{{ spring_datasource_username }}"
      POSTGRES_PASSWORD: "{{ spring_datasource_password }}"
  tags: deploy

- name: Pull application image from registry
  become_user: "{{ docker_user }}"
  community.docker.docker_image:
    name: "{{ docker_image }}"
    tag: "{{ docker_tag }}"
    source: pull
    force_source: true
  tags: deploy

- name: Remove application container before recreate
  become_user: "{{ docker_user }}"
  community.docker.docker_container:
    name: application
    state: absent
  tags: deploy

- name: Start Application
  become_user: "{{ docker_user }}"
  community.docker.docker_container:
    name: application
    image: "{{ docker_image_ref }}"
    pull: true
    recreate: true
    restart_policy: unless-stopped
    networks:
      - name: "{{ docker_network_name }}"
    volumes:
      - "{{ app_log_dir }}:/app/logs"
    ports:
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:{{ app_management_upstream_port }}:9090"
    env:
      JAVA_OPTS: "{{ java_opts }}"
      SPRING_DATASOURCE_USERNAME: "{{ spring_datasource_username }}"
      SPRING_DATASOURCE_PASSWORD: "{{ spring_datasource_password }}"
      SPRING_DATASOURCE_URL: "{{ spring_datasource_url }}"
      STORAGE_S3_BUCKET: "{{ storage_s3_bucket }}"
      STORAGE_S3_REGION: "{{ storage_s3_region }}"
      STORAGE_S3_ENDPOINT: "{{ storage_s3_endpoint }}"
      STORAGE_S3_ACCESSKEY: "{{ storage_s3_accesskey }}"
      STORAGE_S3_SECRETKEY: "{{ storage_s3_secretkey }}"
      STORAGE_S3_CDNURL: ""
      MANAGEMENT_SERVER_PORT: "9090"
  tags: deploy

- name: Extract frontend static files from application image
  ansible.builtin.shell: |
    set -euo pipefail
    cid=$(docker create "{{ docker_image_ref }}")
    trap 'docker rm -f "$cid" >/dev/null 2>&1 || true' EXIT
    rm -rf /tmp/app.jar /tmp/static-extract "{{ nginx_static_root }}"/*
    docker cp "$cid:/app/app.jar" /tmp/app.jar
    unzip -qo /tmp/app.jar "BOOT-INF/classes/static/*" -d /tmp/static-extract
    cp -r /tmp/static-extract/BOOT-INF/classes/static/. "{{ nginx_static_root }}/"
    rm -rf /tmp/static-extract /tmp/app.jar
  args:
    executable: /bin/bash
  tags: deploy

- name: Set ownership on static files for Nginx
  ansible.builtin.file:
    path: "{{ nginx_static_root }}"
    state: directory
    owner: www-data
    group: www-data
    recurse: true
  tags: deploy

- name: Start nginx after application port bindings are updated
  ansible.builtin.systemd:
    name: nginx
    state: started
    enabled: true
  tags:
    - deploy
    - nginx
