---
- name: Ensure nginx proxy cache directory exists
  ansible.builtin.file:
    path: /var/cache/nginx/bulletins
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"
  tags:
    - prepare
    - deploy
    - nginx

- name: Ensure static files directory exists
  ansible.builtin.file:
    path: "{{ nginx_static_root }}"
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"
  tags:
    - prepare
    - deploy
    - nginx

- name: Ensure certbot webroot exists
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"
  loop:
    - "{{ certbot_webroot }}"
    - "{{ certbot_webroot }}/.well-known"
    - "{{ certbot_webroot }}/.well-known/acme-challenge"
  tags:
    - prepare
    - deploy
    - nginx
    - certbot

- name: Check if TLS certificate exists
  ansible.builtin.stat:
    path: "{{ certbot_cert_path }}/fullchain.pem"
  register: ssl_certificate_file
  tags:
    - prepare
    - deploy
    - nginx
    - certbot

- name: Ensure Nginx configuration directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /etc/nginx/conf.d
    - /etc/nginx/snippets
  tags:
    - prepare
    - deploy
    - nginx
    - certbot

- name: Deploy Nginx JSON log format snippet
  ansible.builtin.template:
    src: nginx-log-formats.conf.j2
    dest: /etc/nginx/snippets/log-formats.conf
    mode: "0644"
  notify: Reload nginx
  tags:
    - prepare
    - deploy
    - nginx
    - certbot
    - monitoring

- name: Deploy Nginx monitoring location snippets
  ansible.builtin.template:
    src: nginx-monitoring-locations.conf.j2
    dest: /etc/nginx/snippets/monitoring-locations.conf
    mode: "0644"
  notify: Reload nginx
  tags:
    - prepare
    - deploy
    - nginx
    - certbot
    - monitoring

- name: Deploy Nginx stub_status configuration
  ansible.builtin.template:
    src: nginx-stub-status.conf.j2
    dest: /etc/nginx/conf.d/nginx-stub-status.conf
    mode: "0644"
  notify: Reload nginx
  tags:
    - prepare
    - deploy
    - nginx
    - certbot
    - monitoring

- name: Deploy Nginx shared location snippets
  ansible.builtin.template:
    src: nginx-bulletins-locations.conf.j2
    dest: /etc/nginx/snippets/bulletins-locations.conf
    mode: "0644"
  notify: Reload nginx
  tags:
    - prepare
    - deploy
    - nginx
    - certbot

- name: Deploy Nginx site configuration
  ansible.builtin.template:
    src: nginx-bulletins.conf.j2
    dest: /etc/nginx/conf.d/bulletins.conf
    mode: "0644"
  vars:
    nginx_ssl_enabled: "{{ ssl_certificate_file.stat.exists | default(false) }}"
  notify: Reload nginx
  tags:
    - prepare
    - deploy
    - nginx
    - certbot

- name: Flush handlers to reload nginx configuration
  ansible.builtin.meta: flush_handlers
  tags:
    - prepare
    - deploy
    - nginx
    - certbot

- name: Validate nginx configuration
  ansible.builtin.command: nginx -t
  changed_when: false
  tags:
    - prepare
    - deploy
    - nginx
    - certbot

- name: Reload nginx to apply site configuration
  ansible.builtin.systemd:
    name: nginx
    state: reloaded
    enabled: true
  failed_when: false
  tags:
    - prepare
    - nginx
    - certbot

- name: Allow Actuator access from monitoring server
  community.general.ufw:
    rule: allow
    src: "{{ app_management_allow_from }}"
    port: "{{ app_management_port }}"
    proto: tcp
  when: ansible_os_family == "Debian"
  tags:
    - prepare
    - deploy
    - nginx
    - monitoring

- name: Allow Actuator access from VPN server
  community.general.ufw:
    rule: allow
    src: "{{ vpn_server_ip }}"
    port: "{{ app_management_port }}"
    proto: tcp
  when: ansible_os_family == "Debian"
  tags:
    - prepare
    - deploy
    - nginx
    - monitoring
