---
- name: Ensure nginx proxy cache directory exists
  ansible.builtin.file:
    path: /var/cache/nginx/bulletins
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"
  tags:
    - prepare
    - deploy
    - nginx

- name: Ensure static files directory exists
  ansible.builtin.file:
    path: "{{ nginx_static_root }}"
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"
  tags:
    - prepare
    - deploy
    - nginx

- name: Ensure certbot webroot exists
  ansible.builtin.file:
    path: "{{ certbot_webroot }}"
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"
  tags:
    - prepare
    - deploy
    - nginx
    - certbot

- name: Check if TLS certificate exists
  ansible.builtin.stat:
    path: "{{ certbot_cert_path }}/fullchain.pem"
  register: ssl_certificate_file
  tags:
    - prepare
    - deploy
    - nginx
    - certbot

- name: Ensure Nginx configuration directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /etc/nginx/conf.d
    - /etc/nginx/snippets
  tags:
    - prepare
    - deploy
    - nginx
    - certbot

- name: Deploy Nginx shared location snippets
  ansible.builtin.template:
    src: nginx-bulletins-locations.conf.j2
    dest: /etc/nginx/snippets/bulletins-locations.conf
    mode: "0644"
  notify: Reload nginx
  tags:
    - prepare
    - deploy
    - nginx
    - certbot

- name: Deploy Nginx site configuration
  ansible.builtin.template:
    src: nginx-bulletins.conf.j2
    dest: /etc/nginx/conf.d/bulletins.conf
    mode: "0644"
  vars:
    nginx_ssl_enabled: "{{ ssl_certificate_file.stat.exists | default(false) }}"
  notify: Reload nginx
  tags:
    - prepare
    - deploy
    - nginx
    - certbot

- name: Flush handlers before nginx restart
  ansible.builtin.meta: flush_handlers
  tags:
    - prepare
    - deploy
    - nginx
    - certbot

- name: Validate nginx configuration
  ansible.builtin.command: nginx -t
  changed_when: false
  tags:
    - prepare
    - deploy
    - nginx
    - certbot

- name: Restart nginx to apply site configuration
  ansible.builtin.systemd:
    name: nginx
    state: restarted
    enabled: true
  tags:
    - prepare
    - deploy
    - nginx
    - certbot
