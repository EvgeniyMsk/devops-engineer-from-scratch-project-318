---
- name: Create promtail group
  ansible.builtin.group:
    name: promtail
    system: true
    state: present
  tags:
    - prepare
    - monitoring
    - promtail

- name: Create promtail user
  ansible.builtin.user:
    name: promtail
    group: promtail
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    groups:
      - docker
      - adm
    append: true
  tags:
    - prepare
    - monitoring
    - promtail

- name: Ensure promtail directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: promtail
    group: promtail
    mode: "0755"
  loop:
    - "{{ promtail_config_dir }}"
    - /var/lib/promtail
  tags:
    - prepare
    - monitoring
    - promtail

- name: Download Promtail archive
  ansible.builtin.get_url:
    url: "{{ promtail_download_url }}"
    dest: "/tmp/promtail-{{ promtail_version }}.linux-{{ promtail_arch }}.zip"
    mode: "0644"
  tags:
    - prepare
    - monitoring
    - promtail

- name: Extract Promtail binary
  ansible.builtin.unarchive:
    src: "/tmp/promtail-{{ promtail_version }}.linux-{{ promtail_arch }}.zip"
    dest: /tmp
    remote_src: true
    creates: "/tmp/promtail-linux-{{ promtail_arch }}"
  tags:
    - prepare
    - monitoring
    - promtail

- name: Install Promtail binary
  ansible.builtin.copy:
    src: "/tmp/promtail-linux-{{ promtail_arch }}"
    dest: "{{ promtail_install_dir }}/promtail"
    owner: root
    group: root
    mode: "0755"
    remote_src: true
  notify: Restart promtail
  tags:
    - prepare
    - monitoring
    - promtail

- name: Deploy Promtail configuration
  ansible.builtin.template:
    src: promtail.yml.j2
    dest: "{{ promtail_config_dir }}/promtail.yml"
    owner: promtail
    group: promtail
    mode: "0640"
  notify: Restart promtail
  no_log: "{{ promtail_loki_basic_auth_password | default('') | length > 0 }}"
  tags:
    - prepare
    - monitoring
    - promtail

- name: Deploy Promtail systemd unit
  ansible.builtin.template:
    src: promtail.service.j2
    dest: /etc/systemd/system/promtail.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart promtail
  tags:
    - prepare
    - monitoring
    - promtail

- name: Enable and start Promtail
  ansible.builtin.systemd:
    name: promtail
    state: started
    enabled: true
    daemon_reload: true
  tags:
    - prepare
    - monitoring
    - promtail

- name: Write Promtail end-to-end test log line
  ansible.builtin.copy:
    dest: "{{ app_log_dir }}/e2e-test.log"
    content: |
      {"timestamp":"{{ ansible_date_time.iso8601 }}","level":"INFO","message":"promtail-e2e-test","user":"e2e-checker","logger":"ansible.promtail"}
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    mode: "0644"
    force: false
  tags:
    - test_logging
