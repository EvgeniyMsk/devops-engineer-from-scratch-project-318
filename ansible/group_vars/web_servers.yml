docker_user: "user"
postgres_image: postgres:14
postgres_data_dir: /var/lib/postgresql/bulletins
postgres_data_uid: 999
postgres_data_gid: 999
docker_image: cr.yandex/crpd2isbgl7k3puo75s1/project-devops-deploy
docker_tag: latest
docker_image_ref: "{{ docker_image }}:{{ docker_tag }}"
app_log_dir: /var/log/bulletins
app_deploy_dir: "/home/{{ docker_user }}/project-devops-deploy"
spring_datasource_url: jdbc:postgresql://database:5432/bulletins
storage_s3_endpoint: https://storage.yandexcloud.net
storage_s3_bucket: hexlet-bucket
storage_s3_region: ru-central1
java_opts: "-Xms256m -Xmx512m -Dspring.profiles.active=prod"

# Docker (geerlingguy.docker)
docker_compose_version: "v5.1.4"
docker_compose_path: "/usr/local/bin/docker-compose"
docker_install_compose: true
docker_users:
  - "{{ docker_user }}"
docker_network_name: application_network
docker_registry_url: cr.yandex
docker_registry_username: oauth

# Nginx reverse proxy (geerlingguy.nginx + site templates)
nginx_static_root: /var/www/bulletins
nginx_client_max_body_size: 64m
app_http_port: 8080
app_management_port: 9090
nginx_remove_default_vhost: true
nginx_monitoring_access_log: /var/log/nginx/monitoring-access.json
nginx_monitoring_error_log: /var/log/nginx/monitoring-error.json
nginx_monitoring_error_log_level: warn
nginx_vhosts: []
nginx_proxy_cache_path: "/var/cache/nginx/bulletins levels=1:2 keys_zone=bulletins_cache:32m max_size=256m inactive=7d use_temp_path=off"
nginx_extra_http_options: |
  include /etc/nginx/snippets/log-formats.conf;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

# Certbot (geerlingguy.certbot)
certbot_domain: task.devops-campus.ru
certbot_email: logvinov.evgeniy@yandex.ru
certbot_webroot: /var/www/letsencrypt
certbot_cert_path: "/etc/letsencrypt/live/{{ certbot_domain }}"
certbot_renew_hour: "3"
certbot_renew_minute: "30"
certbot_install_method: package
certbot_create_method: webroot
certbot_create_extra_args: ""
certbot_create_if_missing: true
certbot_auto_renew: true
certbot_auto_renew_user: root
certbot_auto_renew_options: "--quiet --deploy-hook 'systemctl reload nginx'"
certbot_certs:
  - email: "{{ certbot_email }}"
    webroot: "{{ certbot_webroot }}"
    domains:
      - "{{ certbot_domain }}"

# Node Exporter (node_exporter role)
node_exporter_version: "1.11.1"
node_exporter_listen_address: "127.0.0.1:9100"
